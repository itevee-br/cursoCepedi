<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0a0c0e; /* Fundo sólido escuro */
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Container principal que ocupa toda a tela */
    .login-container {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    /* Box de login sem bordas */
    .login-box {
        width: 100%;
        max-width: 400px;
        padding: 40px;
        background: transparent; /* Fundo transparente */
    }

    /* Título */
    .login-title {
        text-align: center;
        color: #ffffff;
        font-weight: 600;
        font-size: 2rem;
        margin-bottom: 30px;
        background: linear-gradient(135deg, #ffffff, #a0aec0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Estilo do formulário */
    form {
        width: 100%;
    }

    /* Container dos campos */
    .form-group {
        margin-bottom: 20px;
    }

    /* Labels */
    form label {
        display: block;
        margin-bottom: 8px;
        color: #94a3b8;
        font-size: 0.9rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Inputs */
    form input {
        width: 100%;
        padding: 15px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        color: #ffffff;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    form input:focus {
        outline: none;
        border-color: #10b981;
        background: rgba(255,255,255,0.05);
        box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
    }

    form input::placeholder {
        color: #4a5568;
    }

    /* Botão de login - Verde */
    button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #10b981, #059669);
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(16,185,129,0.2);
        margin-top: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    button:hover {
        background: linear-gradient(135deg, #34d399, #10b981);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(16,185,129,0.3);
    }

    button:active {
        transform: translateY(0);
    }

    /* Estilo para mensagens de erro */
    .errorlist.nonfield {
        list-style: none;
        padding: 0;
        margin: 0 0 20px 0;
        width: 100%;
    }

    .errorlist.nonfield li {
        color: #ffffff;
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 10px;
        padding: 15px;
        font-size: 0.95rem;
        line-height: 1.5;
        word-wrap: break-word;
        word-break: break-word;
        text-align: center;
    }

    /* Token CSRF invisível */
    input[name="csrfmiddlewaretoken"] {
        display: none;
    }

    /* Estilo para os parágrafos do form.as_p */
    form p {
        margin-bottom: 20px;
        color: #ffffff;
    }

    /* Responsividade */
    @media (max-width: 480px) {
        .login-box {
            padding: 20px;
        }
        
        .login-title {
            font-size: 1.8rem;
        }
        
        form input, button {
            padding: 12px;
        }
    }
</style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Login</h1>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">🔐 Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
