<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aluno Sorteado</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0a0c0e;
        background-image: 
            repeating-linear-gradient(30deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 30px),
            repeating-linear-gradient(-30deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 30px),
            radial-gradient(circle at 30% 50%, rgba(255,255,255,0.02) 0%, transparent 50%),
            radial-gradient(circle at 70% 30%, rgba(255,255,255,0.02) 0%, transparent 50%);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        position: relative;
    }

    fieldset {
        width: auto;
        min-width: 300px;
        max-width: 800px;
        padding: 30px;
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 20px;
        background: rgba(18,22,28,0.95);
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        position: relative;
        z-index: 1;
    }

    legend {
        text-align: center;
        color: #ffffff;
        font-weight: 600;
        font-size: 1.5rem;
        margin-bottom: 10px;
    }

    legend h1 { margin: 0; font-size: 1.8rem; }

    .title-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .python-logo {
        width: 40px;
        height: 40px;
        filter: drop-shadow(0 0 10px rgba(255,215,0,0.3));
    }

    .title-container h1 {
        margin: 0;
        font-size: 1.4rem;
        background: linear-gradient(135deg, #ffffff, #a0aec0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    a {
        display: inline-block;
        text-decoration: none;
        color: #e2e8f0;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.05);
        padding: 12px 20px;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 500;
        transition: all 0.3s ease;
        text-align: center;
        margin: 5px;
    }

    a:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.15);
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        color: #ffffff;
    }

    button {
        width: 100%;
        padding: 14px 20px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(59,130,246,0.2);
    }

    button:hover {
        background: linear-gradient(135deg, #60a5fa, #3b82f6);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(59,130,246,0.3);
    }

    button[type="submit"] { background: linear-gradient(135deg, #dc2626, #b91c1c); }

    ol { list-style: none; padding: 0; margin: 20px 0 0; }
    
    .tabela {
        list-style: none;
        margin-top: 20px;
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 12px;
        background: rgba(10,14,18,0.6);
    }

    .tabela li {
        display: grid;
        grid-template-columns: 2fr 0.8fr 2.5fr 1.2fr;
        gap: 15px;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        color: #e2e8f0;
    }

    .tabela li:last-child { border-bottom: none; }
    .tabela li.header {
        font-weight: 600;
        background: rgba(255,255,255,0.03);
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .nome { font-weight: 600; color: #ffffff !important; }
    
    .tabela li span:last-child {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 500;
        background: rgba(34,197,94,0.1);
        color: #4ade80 !important;
        border: 1px solid rgba(34,197,94,0.2);
    }

    .tabela li span:last-child:contains("Não"),
    .matriculado-false {
        background: rgba(239,68,68,0.1) !important;
        color: #f87171 !important;
        border: 1px solid rgba(239,68,68,0.2) !important;
    }

    form p { margin-bottom: 15px; color: #e2e8f0; }
    form label { display: block; margin-bottom: 5px; color: #94a3b8; }
    form input, form select, form textarea {
        width: 100%;
        padding: 12px 15px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        color: #ffffff;
    }

    p { color: #e2e8f0; margin-bottom: 10px; }
    p strong { color: #94a3b8; }

    @media (max-width: 768px) {
        .tabela li { grid-template-columns: 1fr; }
        .tabela li.header { display: none; }
        .tabela li span::before {
            content: attr(data-label);
            font-weight: 600;
            color: #94a3b8;
            min-width: 80px;
        }
    }

    @media (max-width: 480px) {
        fieldset { width: 90%; padding: 20px; }
        .title-container { flex-direction: column; text-align: center; }
    }
</style>
</head>
<body>
    <fieldset>
        <legend><h1>{{ aluno.nome }}</h1></legend>

        <p><strong>ID:</strong> {{ aluno.id }}</p>
        <p><strong>Email:</strong> {{ aluno.email }}</p>
        <p><strong>Matriculado:</strong> {{ aluno.matriculado|yesno:"Sim,Não" }}</p>
        <br>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <a href="{% url 'lista_alunos' %}">← Voltar para a lista</a>
            <a href="{% url 'detalhe_aluno' %}">🎲 Sortear outro</a>
        </div>
    </fieldset>
</body>
</html>
